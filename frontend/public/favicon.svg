<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dotGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="60" fill="#000000"/>
  
  <!-- "pro" text - white, bold -->
  <text x="10" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="-0.5">pro</text>
  
  <!-- Blue dot with gradient -->
  <circle cx="68" cy="30" r="4" fill="url(#dotGradient)"/>
  
  <!-- "ep" text - blue with gradient -->
  <text x="78" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#blueGradient)" letter-spacing="-0.5">ep</text>
  
  <!-- ".az" text - grey, smaller, thinner -->
  <text x="118" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="300" fill="#6b7280" letter-spacing="0">.az</text>
</svg>
