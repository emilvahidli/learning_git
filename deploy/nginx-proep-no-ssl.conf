# Proep.az Nginx Configuration (SSL olmadan - ilkin setup)
# SSL sertifikatı alındıqdan sonra nginx-proep.conf istifadə edin

# HTTP server
server {
    listen 80;
    listen [::]:80;
    server_name proep.az www.proep.az;

    # Root directory - frontend build
    root /home/pro/projects/proep/frontend/dist;
    index index.html;

    # Log files
    access_log /var/log/nginx/proep-access.log;
    error_log /var/log/nginx/proep-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA routing - bütün request-ləri index.html-ə yönləndir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Let's Encrypt challenge üçün
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
