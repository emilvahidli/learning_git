# Proep.az Nginx Configuration
# Bu faylı /etc/nginx/sites-available/proep.az kimi saxlayın
# Sonra: sudo ln -s /etc/nginx/sites-available/proep.az /etc/nginx/sites-enabled/
# sudo nginx -t (test)
# sudo systemctl reload nginx

# HTTP server - SSL üçün yönləndirmə
server {
    listen 80;
    listen [::]:80;
    server_name proep.az www.proep.az;

    # Let's Encrypt challenge üçün
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # SSL olmayan request-ləri HTTPS-ə yönləndir
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name proep.az www.proep.az;

    # SSL sertifikatları (Certbot avtomatik doldurur)
    ssl_certificate /etc/letsencrypt/live/proep.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proep.az/privkey.pem;
    
    # SSL konfiqurasiyası
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Root directory - frontend build
    root /home/pro/projects/proep/frontend/dist;
    index index.html;

    # Log files
    access_log /var/log/nginx/proep-access.log;
    error_log /var/log/nginx/proep-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA routing - bütün request-ləri index.html-ə yönləndir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # API proxy (backend üçün - əgər eyni serverdədirsə)
    # location /api {
    #     proxy_pass http://localhost:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }
}
